<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calendar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="page-shell">
    <section class="card form-card">
        <p class="eyebrow">Simple Calendar</p>
        <h1>Plan your next event</h1>
        <p class="intro">Choose a date and time, add a title, and keep your schedule in one tidy list.</p>

        <form id="event-form" class="event-form">
            <label for="title">Event Title</label>
            <input id="title" name="title" type="text" placeholder="Team meeting" required>

            <label for="date">Date</label>
            <input id="date" name="date" type="date" required>

            <label for="time">Time</label>
            <input id="time" name="time" type="time" required>

            <button type="submit">Add Event</button>
        </form>

        <p id="form-message" class="form-message" aria-live="polite"></p>
    </section>

    <section class="card list-card">
        <div class="list-header">
            <div>
                <p class="eyebrow">Upcoming</p>
                <h2>Event List</h2>
            </div>
            <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
        </div>

        <ul id="event-list" class="event-list"></ul>
        <p id="empty-state" class="empty-state">No events yet. Add one to get started.</p>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
